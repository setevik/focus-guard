<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusGuard</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header>
      <h1>FocusGuard</h1>
    </header>

    <!-- Rules list -->
    <section class="rules-section" id="rules-section">
      <div class="rules-list" id="rules-list">
        <p class="empty-state" id="empty-state">No rules configured yet.</p>
      </div>
    </section>

    <!-- Add rule form -->
    <section class="add-section">
      <button class="add-toggle" id="add-toggle">+ Add Rule</button>
      <form class="add-form hidden" id="add-form">
        <div class="form-row">
          <input type="text" id="input-domain" placeholder="e.g. reddit.com" required>
        </div>
        <div class="form-row form-row-split">
          <div class="form-field">
            <label for="input-minutes">Budget (min)</label>
            <input type="number" id="input-minutes" min="1" max="120" value="5" required>
          </div>
          <div class="form-field">
            <label for="input-window">Window (min)</label>
            <input type="number" id="input-window" min="10" max="1440" value="180" required>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="input-subdomains" checked>
            Match subdomains
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancel-add">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </section>

    <!-- Settings -->
    <section class="settings-section">
      <button class="settings-toggle" id="settings-toggle">Settings</button>
      <div class="settings-form hidden" id="settings-form">
        <div class="form-row form-row-split">
          <div class="form-field">
            <label for="input-idle">Idle threshold (s)</label>
            <input type="number" id="input-idle" min="30" max="600" value="120">
          </div>
          <div class="form-field">
            <label for="input-heartbeat">Heartbeat (s)</label>
            <input type="number" id="input-heartbeat" min="5" max="60" value="15">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-primary" id="save-settings">Save Settings</button>
        </div>
      </div>
    </section>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
